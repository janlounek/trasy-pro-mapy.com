<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Trasy pro mapy.com — master logo.
       Concept: a compass disc with a zigzag hiking trail crossing it
       diagonally. Forest-green palette intentionally distinct from
       Seznam's brand green. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1f5132"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background (Chrome icon convention). -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- White compass face. -->
  <circle cx="256" cy="256" r="172" fill="#ffffff"/>
  <!-- Subtle inner ring for depth. Vanishes at small sizes; that's fine. -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#1f5132" stroke-width="3" opacity="0.18"/>

  <!-- Cardinal tick marks. -->
  <g fill="#1f5132">
    <rect x="252" y="92"  width="8" height="22"/>
    <rect x="252" y="398" width="8" height="22"/>
    <rect x="92"  y="252" width="22" height="8"/>
    <rect x="398" y="252" width="22" height="8"/>
  </g>

  <!-- Zigzag trail across the compass face. -->
  <path d="M 132 380 L 220 320 L 170 260 L 280 220 L 220 168 L 380 148"
        fill="none" stroke="#1f5132" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Endpoint dots. -->
  <circle cx="132" cy="380" r="16" fill="#1f5132"/>
  <circle cx="380" cy="148" r="16" fill="#1f5132"/>
</svg>
