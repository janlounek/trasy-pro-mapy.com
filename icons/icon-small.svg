<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 16/32 px variant — drops the mountain silhouette and uses a thicker
       trail stroke so the route stays readable at small sizes. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1f5132"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <path d="M 116 408 C 116 318 230 308 244 248 C 258 188 362 178 396 110"
        fill="none" stroke="#ffffff" stroke-width="58" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="116" cy="408" r="48" fill="#ffffff"/>
  <circle cx="396" cy="110" r="48" fill="#ffffff"/>
</svg>
