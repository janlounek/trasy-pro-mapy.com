<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 16/32 px variant — drops the cardinal ticks and the subtle inner ring
       (both pixel out at small sizes), thickens the trail and endpoint dots
       so the diagonal zigzag stays legible. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1f5132"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="180" fill="#ffffff"/>

  <path d="M 132 380 L 220 320 L 170 260 L 280 220 L 220 168 L 380 148"
        fill="none" stroke="#1f5132" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="132" cy="380" r="22" fill="#1f5132"/>
  <circle cx="380" cy="148" r="22" fill="#1f5132"/>
</svg>
